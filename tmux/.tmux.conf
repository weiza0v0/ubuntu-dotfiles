# ================================================================
# 1. 基础设置
# ================================================================
set -g mouse on
set -g prefix C-a
unbind C-b
bind C-a send-prefix

setw -g mode-keys vi
set -s escape-time 0  # 解决 Neovim 的 Esc 延迟问题
set -g default-terminal "tmux-256color"

# ================================================================
# 2. 快捷键增强 (集成自旧配置)
# ================================================================
# 快速进入复制模式 (免 Prefix)
bind -n M-s copy-mode

# 分屏快捷键
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ================================================================
# 窗口管理 (Alt + 字母)
# ================================================================
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-w confirm-before -p "kill-window #W? (y/n)" kill-window
set -g renumber-windows on

# ================================================================
# 3. 智能跳转逻辑 (保持现状 - 绝对不能动)
# ================================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# ================================================================
# 4. 复制模式 (Copy Mode) 内部增强
# ================================================================
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi i send-keys -X cancel  # 按 i 像回到 Insert 模式一样退出

# 让复制模式下也能用 Ctrl-hjkl 跳出
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# ================================================================
# 5. 外观
# ================================================================
set -g status-interval 5
set -g status-left "#[fg=green,bold] 🖥️  #S #[default]"
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M #[fg=yellow]🔥 #(cut -d ' ' -f 1-3 /proc/loadavg) "
set -g status-style bg=default

# ================================================================
# 6. 帮助 (prefix + ?)
# ================================================================
bind ? run-shell "tmux send-keys -t #{pane_id} clear Enter; tmux send-keys -t #{pane_id} 'cat ~/.config/tmux/help | less' Enter"
