"$schema" = 'https://starship.rs/config-schema.json'

# ---- Prompt layout ----
# Only show what matters: ssh ÔåÆ dir ÔåÆ git ÔåÆ conda ÔåÆ duration ÔåÆ time ÔåÆ newline ÔåÆ prompt
format = """
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$conda\
$cmd_duration\
$time\
$line_break\
$character\
"""

# ---- Command duration (show if > 1s) ----
[cmd_duration]
min_time = 1000
show_milliseconds = true
format = "took [$duration]($style) "

# ---- Current time ----
[time]
disabled = false
format = "[$time]($style) "
time_format = "%T"

# ---- Directory (truncate to 3 components for cleanliness) ----
[directory]
truncation_length = 3
truncate_to_repo = false
read_only = " ¾░î¥"

# ---- Hostname (only shows when SSH) ----
[hostname]
ssh_only = true
format = "[$ssh_symbol$hostname]($style) "
trim_at = "."

# ---- Git branch ----
[git_branch]
format = "on [$symbol$branch]($style) "
symbol = "´Éİ "

# ---- Git status ----
[git_status]
format = '[\\($all_status\\)]($style)[\\(:$ahead_behind\\)]($style) '
conflicted = "¯½¥ "
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "Ôçí${ahead_count}Ôçú${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "´âå "
modified = "!${count}"
staged = "+${count}"
renamed = "ÔåÆ${count}"
deleted = "Ô£İ${count}"

# ---- Conda ----
[conda]
format = "via [$symbol$environment]($style) "
symbol = "¯£ò "
ignore_base = false

# ---- Prompt character ----
[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"

# ---- Status (exit code, shown only on error) ----
[status]
symbol = "Ô£ù "
format = "[$symbol$status]($style) "
disabled = false

